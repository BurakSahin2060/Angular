<h2>Schüler hinzufügen</h2>

<input [(ngModel)]="student.name" placeholder="Name">
<br><br>

<input [(ngModel)]="student.geburtstag" type="date">
<br><br>

<select [(ngModel)]="student.geschlecht">
  <option value="männlich">Männlich</option>
  <option value="weiblich">Weiblich</option>
</select>
<br><br>

<input [(ngModel)]="student.klasse" placeholder="Klasse">
<br><br>

<button (click)="addStudent()">Speichern</button>
